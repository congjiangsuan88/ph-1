                        <button onclick="quickSet(5000)" class="shrink-0 snap-start px-4 py-2 bg-white text-blue-600 text-[11px] font-bold rounded-xl border border-slate-200 active:scale-95 transition-all">+¥5k</button>
                        <button onclick="quickSet(10000)" class="shrink-0 snap-start px-4 py-2 bg-white text-blue-600 text-[11px] font-bold rounded-xl border border-slate-200 active:scale-95 transition-all">+¥1w</button>
                        <button onclick="quickSet(50000)" class="shrink-0 snap-start px-4 py-2 bg-white text-blue-600 text-[11px] font-bold rounded-xl border border-slate-200 active:scale-95 transition-all">+¥5w</button>

                        <input type="number" id="phpInput" placeholder="输入金额" class="w-full bg-transparent text-3xl font-black focus:outline-none pr-12 text-blue-900">

                签证到期助手
            </h2>

                <select id="vType" class="w-full p-4 bg-slate-50 rounded-2xl border-0 font-bold focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                    <option value="30">旅游签续签 (30天)</option>

        <section class="space-y-6">
            <h2 class="font-bold text-slate-800 px-1 text-xl">📍 核心办事处指南</h2>
            <div id="locList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <footer onclick="copyAndGo()" class="bg-slate-900 p-8 rounded-[3rem] text-center cursor-pointer hover:bg-slate-800 transition-all group relative overflow-hidden shadow-2xl">
            <div id="copyTip" class="absolute inset-0 bg-blue-600 flex items-center justify-center text-white font-bold opacity-0 transition-opacity">
                ✅ 已复制 @ph_one_com 并跳转
            </div>
            <div class="text-blue-400 font-black text-xl mb-1 group-hover:scale-105 transition-transform">✨ 商务合作 / 签证换汇 ✨</div>
            <p class="text-slate-500 text-[10px] tracking-widest uppercase font-bold">TELEGRAM: @ph_one_com (点击复制联系)</p>
        </footer>

    </main>

    <script>
        // --- 逻辑与之前版本保持一致 ---
        let currentRate = 8.70;
        const LOSS_RATE = 0.985;
        const CACHE_KEY = 'ph1_final_cache';
        const CACHE_TIME = 3600000;

        const locations = [{ name: "移民局总局 (BI Main Office)", addr: "Magallanes Dr, Intramuros, Manila", mapUrl: "https://www.google.com/maps/search/?api=1&query=Bureau+of+Immigration+Main+Office+Intramuros", grab: "350-500", tips: "禁拖鞋短裤。建议早7点到场。办ECC务必提前3天。" }, { name: "移民局 BGC 分局 (SM Aura)", addr: "8th Floor, SM Aura Tower, Taguig", mapUrl: "https://www.google.com/maps/search/?api=1&query=Bureau+of+Immigration+SM+Aura", grab: "150-300", tips: "环境极佳。仅限简单续签，不受理工签降签业务。" }, { name: "DFA 外交部总局 (ASEANA)", addr: "Aseana Business Park, Parañaque", mapUrl: "https://www.google.com/maps/search/?api=1&query=DFA+Aseana+Consular+Office", grab: "400-600", tips: "必须持打印好的预约单。现场不接受Walk-in。" }, { name: "NBI 办事处 (UN Ave)", addr: "650 UN Ave, Ermita, Manila", mapUrl: "https://www.google.com/maps/search/?api=1&query=NBI+Clearance+Center+UN+Ave", grab: "200-400", tips: "姓名重名(HIT)需等10天。建议穿深色有领衣服拍摄。" }, { name: "LTO 运输署总局 (驾照业务)", addr: "LTO Compound, East Ave, Quezon City", mapUrl: "https://www.google.com/maps/search/?api=1&query=LTO+Main+Office+East+Ave", grab: "400-600", tips: "严禁背心短裤。务必先注册LTMS账号。无视门外所有伸手搭讪的‘中介’。" }, { name: "PSA 统计局 (出生/结婚证)", addr: "PSA Complex, East Ave, Quezon City", mapUrl: "https://www.google.com/maps/search/?api=1&query=Philippine+Statistics+Authority+East+Ave", grab: "400-600", tips: "需提前在线预约。若不急用，建议去各大SM商场的PSA代办点，环境更舒适。" }, { name: "BIR 税务局总署 (TIN税卡)", addr: "BIR Road, Diliman, Quezon City", mapUrl: "https://www.google.com/maps/search/?api=1&query=Bureau+of+Internal+Revenue+Main", grab: "350-550", tips: "税卡丢失补办或信息更新首选。下午3点停止放号，请务必赶早。" }];
        function calcToPhp() {
            const val = document.getElementById('cnyInput').value;
            const res = document.getElementById('phpResult');
            res.innerText = val ? (parseFloat(val) * currentRate * LOSS_RATE).toFixed(2) : "0.00";
        }

        function calcToCny() {
            const val = document.getElementById('phpInput').value;
            const res = document.getElementById('cnyResult');
            res.innerText = val ? (parseFloat(val) / currentRate * LOSS_RATE).toFixed(2) : "0.00";
        }

        function quickSet(amt) {
            document.getElementById('cnyInput').value = amt;
            calcToPhp();
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        }

        async function fetchRate(isForced = false) {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('rate-time');
            const display = document.getElementById('php-rate');

            if (isForced) localStorage.removeItem(CACHE_KEY);
            const cached = localStorage.getItem(CACHE_KEY);
            const now = Date.now();

            if (cached && !isForced) {
                const { rate, ts } = JSON.parse(cached);
                if (now - ts < CACHE_TIME) {
                    currentRate = rate;
                    updateUI(rate, ts, "缓存模式");
                    return;
                }
            }

            dot.className = "w-2 h-2 rounded-full bg-blue-500 animate-ping";
            txt.innerText = "同步中...";

            try {
                const res = await fetch(`https://v6.exchangerate-api.com/v6/399e540da4a9ea6038a02bc5/latest/CNY`);
                const data = await res.json();
                if (data.result === "success") {
                    currentRate = data.conversion_rates.PHP;
                    localStorage.setItem(CACHE_KEY, JSON.stringify({ rate: currentRate, ts: now }));
                    updateUI(currentRate, now, "实时同步");
                }
            } catch (e) {
                updateUI(currentRate, now, "网络异常");
            }
        }

        function updateUI(rate, ts, mode) {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('rate-time');
            const display = document.getElementById('php-rate');
            const timeStr = new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            display.innerText = rate.toFixed(2);
            txt.innerText = `${mode} ${timeStr}`;

            if (mode === "实时同步") dot.className = "w-2 h-2 rounded-full bg-green-500";
            else if (mode === "缓存模式") dot.className = "w-2 h-2 rounded-full bg-slate-400";
            else dot.className = "w-2 h-2 rounded-full bg-orange-500 animate-pulse";

            calcToPhp();
            calcToCny();
        }

        function calcVisa() {
            const d = document.getElementById('vDate').value;
            const days = parseInt(document.getElementById('vType').value);
            if (!d) return alert("请先选择日期");
            const exp = new Date(d);
            exp.setDate(exp.getDate() + days);
            const diff = Math.ceil((exp - new Date().setHours(0, 0, 0, 0)) / 86400000);
            const res = document.getElementById('vResult');
            res.classList.remove('hidden');
            res.innerHTML = `
                <div class="text-[10px] opacity-80 mb-1 tracking-widest font-bold uppercase">建议截止日期</div>
                <div class="text-3xl font-black mb-1">${exp.toLocaleDateString('zh-CN')}</div>
                <div class="text-sm font-bold ${diff < 7 ? 'bg-white/20 p-1 rounded inline-block animate-pulse' : ''}">
                    ${diff < 0 ? '❌ 已过期 ' + Math.abs(diff) + ' 天' : '✅ 剩余有效：' + diff + ' 天'}
                </div>
            `;
        }

        function copyAndGo() {
            const tgId = "ph_one_com";
            const tip = document.getElementById('copyTip');
            navigator.clipboard.writeText(tgId).then(() => {
                tip.classList.remove('opacity-0');
                setTimeout(() => {
                    tip.classList.add('opacity-0');
                    window.open(`tg://resolve?domain=${tgId}`, '_blank');
                }, 800);
            });
        }

        window.onload = function () {
            document.getElementById('cnyInput').addEventListener('input', calcToPhp);
            document.getElementById('phpInput').addEventListener('input', calcToCny);
            document.getElementById('locList').innerHTML = locations.map(loc => `
                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-md transition-all">
                    <h3 class="font-bold text-slate-800 mb-1">${loc.name}</h3>
                    <p class="text-[11px] text-slate-400 mb-3 flex items-center gap-1">📍 ${loc.addr}</p>
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-[10px] text-slate-500 font-bold tracking-tight">Grab: ₱${loc.grab}</span>
                        <a href="${loc.mapUrl}" target="_blank" class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-xl text-[10px] font-bold">查看地图</a>
                    </div>
                    <div class="p-3 bg-rose-50 rounded-xl text-[11px] text-rose-700 border-l-4 border-rose-400">
                        <strong>避坑指南：</strong>${loc.tips}
                    </div>
                </div>
            `).join('');
            fetchRate();
        };
    </script>
